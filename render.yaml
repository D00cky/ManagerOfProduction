# Persistent production-oriented Render stack.
# PostgreSQL is the source of truth; Render Key Value (Valkey/Redis-compatible)
# carries Socket.IO fan-out between web instances.
services:
  - type: web
    name: manager-of-production
    runtime: docker
    plan: starter
    preDeployCommand: npx prisma migrate deploy
    dockerCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: manager-of-production-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: manager-of-production-cache
          property: connectionString
      - key: NODE_VERSION
        value: "22"
      - key: NEXTAUTH_SECRET
        generateValue: true
      - key: NEXTAUTH_URL
        sync: false
      - key: DEMO_AUTH_ENABLED
        value: "false"
      - key: DEMO_AUTH_PASSWORD
        sync: false

  - type: keyvalue
    name: manager-of-production-cache
    plan: starter
    ipAllowList: []
    maxmemoryPolicy: allkeys-lru

databases:
  - name: manager-of-production-db
    databaseName: manager_of_production
    user: manager
    plan: basic-1gb
    postgresMajorVersion: "17"
    ipAllowList: []
